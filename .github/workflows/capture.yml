name: Capture Screenshots

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  capture:
    name: Generate Guides
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Puppeteer Browsers
        run: npx puppeteer browsers install chrome

      - name: Start Dev Server
        run: |
          npm run dev &
          # Wait for Vite to be ready (including base path)
          npx wait-on http://localhost:5173/OurstageDiscordHelp/ --timeout 60000

      - name: Install Asian Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra fonts-noto-ui-core
          sudo fc-cache -fv

      - name: Run Capture Script
        run: npm run capture
        env:
          BASE_URL: http://localhost:5173/OurstageDiscordHelp

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: guides
          path: output/*.gif

  release:
    name: Automated Release
    needs: capture
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[Release]')
    permissions:
      contents: write
    
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: guides
          path: release-assets

      - name: Package Guides for Release
        run: |
          cd release-assets
          zip -r ../all_guides.zip .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: Release ${{ github.run_number }}
          body: |
            Automated export of Discord guides.
            Commit: ${{ github.event.head_commit.message }}
          files: |
            release-assets/*.gif
            all_guides.zip
          draft: false
          prerelease: false
